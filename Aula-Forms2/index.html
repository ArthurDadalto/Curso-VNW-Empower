<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula forms (Regex)</title>
</head>
<body>
    <h1>Formulário de cadastro</h1>

    <form action="">

        <label for="Nome">Nome:</label>
        <input type="text" name="Nome" id="Nome"
        placeholder="Digite seu nome"   
        pattern="^[A-Za-zÀ-ÿ\s]{3,50}$"
        title="O nome deve conter apenas letras e espaços (minimo 3 caracteres)"/>     
        <br><br>

        <label for="CPF">CPF:</label>
        <input id="CPF" name="CPF" type="text"
        placeholder="Digite seu CPF"
        pattern="^\d{3}\.?\d{3}\.?\d{3}-?\d{2}$"
        title="Digite um CPF válido. Exemplo: 123.456.789-10"/>
        <br><br>

        <label for="Telefone">Telefone:</label>
        <input id="Telefone" name="Telefone" type="tel"
        placeholder="Digite seu telefone"
        pattern="^\(?\d{2}\)?\s?\d{4,5}-?\d{4}$"
        title="Digite um número de telefone válido"/>
        <br><br>

        <label for="email">E-mail:</label>
        <input type="email" name="email" id="email"
        placeholder="Digite seu e-mail"
        pattern="^[a-zA-z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$"
        title="Digite um e-mail válido"/>
        <br><br>
        
        <label for="senha">Senha:</label>
        <input id="senha" name="senha" type="password"
        placeholder="Digite sua senha"
        pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$"
        title="A senha deve conter ao menos 8 caracteres, incluindo uma letra maiúscula, uma minúscula e um número."/>
        <br><br>

        <label for="data">Data de nascimento:</label>
        <input name="data" id="data" type="date"
        placeholder="DD/MM/AAAA"
        title="Digite no formato DD/MM/AAAA (ex: 12/10/2025)"
        required/>
        <!-- pattern="^\d{2}/\d{2}/\d{4}$" Como estou utilizando type "date", não há necessidade de colocar regex-->
        <br><br><br><br>
        
        <label for="mensagem">Deixe sua mensagem:</label> <br>
        <textarea name="mensagem" id="mensagem" rows="4" cols="40" placeholder="Escreva sua mensagem que em breve entraremos em contato."></textarea>
        <br><br>
    
        <input type="submit" value="Enviar formulário"/>
    </form>

</body>
</html>
