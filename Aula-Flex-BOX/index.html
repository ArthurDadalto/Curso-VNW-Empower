<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula Flexbox</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>O Flexbox</h1>
    <p>
      É a valor de display, que torna uma caixa flex, fazendo com que os
      elementos internos possam receber, alinhamento, ordenação e tamanhos
      flexíveis
    </p>
    <h3>Alinhamento no eixo (X)</h3>
    <section class="container">
      <div class="item">A</div>
      <div class="item">B</div>
      <div class="item">C</div>
    </section>
    <h3>Alinhamento no eixo (Y)</h3>
    <section class="container2">
      <div class="item2">A</div>
      <div class="item2">B</div>
      <div class="item2">C</div>
    </section>
    <h3>Direção do eixo</h3>
    <section class="container3">
      <div class="item3">A</div>
      <div class="item3">B</div>
      <div class="item3">C</div>
    </section>
    <h3>Flex Wrap X</h3>
    <section class="container4">
      <div class="item4">A</div>
      <div class="item4">B</div>
      <div class="item4">C</div>
      <div class="item4">A</div>
      <div class="item4">B</div>
      <div class="item4">C</div>
      <div class="item4">B</div>
      <div class="item4">C</div>
    </section>
        <h3>Flex Grow</h3>
    <section class="container5">
        <div class="box 1">A</div>
        <div class="box 1">B</div>
        <div class="box 1">C</div>
    </section>
  </body>
</html>
